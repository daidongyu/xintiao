                    ctx.strokeStyle = `rgba(200, 100, 255, ${0.6 + runeGlow * 0.4})`;
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.moveTo(-8, 15);
                    ctx.lineTo(-6, -70);
                    ctx.quadraticCurveTo(-3, -82, 0, -87);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(8, 15);
                    ctx.lineTo(6, -70);
                    ctx.quadraticCurveTo(3, -82, 0, -87);
                    ctx.stroke();
                    
                    ctx.shadowBlur = 0;
                    ctx.restore();
                    
                } else {
                    // ========== 恶魔之弓 - 精致弓身 ==========
                    ctx.save();
                    ctx.rotate(-0.3);
                    
                    const bowGrad = ctx.createLinearGradient(-8, -30, 8, 30);
                    bowGrad.addColorStop(0, '#002244');
                    bowGrad.addColorStop(0.5, '#0096ff');
                    bowGrad.addColorStop(1, '#002244');
                    
                    // 弓身弧线
                    ctx.strokeStyle = bowGrad;
                    ctx.lineWidth = 5;
                    ctx.lineCap = 'round';
                    ctx.beginPath();
                    ctx.arc(0, 0, 28, -Math.PI/2 - 0.3, Math.PI/2 + 0.3);
                    ctx.stroke();
                    
                    // 弓身装饰
                    ctx.strokeStyle = '#66ccff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, 25, -Math.PI/2 - 0.2, Math.PI/2 + 0.2);
                    ctx.stroke();
                    
                    // 弓身节点装饰
                    ctx.fillStyle = '#0096ff';
                    ctx.beginPath();
                    ctx.arc(0, -28, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(0, 28, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 弓弦 - 紫色能量效果
                    const stringGlow = Math.sin(time * 6) * 0.4 + 0.6;
                    ctx.strokeStyle = `rgba(150, 0, 255, ${0.6 + stringGlow * 0.4})`;
                    ctx.lineWidth = 2;
                    ctx.shadowColor = '#9600ff';
                    ctx.shadowBlur = 8 + stringGlow * 8;
                    ctx.beginPath();
                    ctx.moveTo(0, -25);
                    ctx.lineTo(-15, 0);
                    ctx.lineTo(0, 25);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    
                    // 弓把
                    ctx.fillStyle = '#440066';
                    ctx.fillRect(-4, -35, 8, 10);
                    ctx.fillRect(-4, 25, 8, 10);
                    
                    // 紫色能量波动
                    ctx.strokeStyle = `rgba(150, 0, 255, ${0.2 + stringGlow * 0.3})`;
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.arc(0, 0, 30 + i * 5 + Math.sin(time * 3 + i) * 2, -Math.PI/2 - 0.4, Math.PI/2 + 0.4);
                        ctx.stroke();
                    }
                    
                    ctx.restore();
                }
                
                ctx.restore();
            }
            
            drawWeaponAttack(ctx, bodyBob) {
                const weapon = CONFIG.WEAPONS[this.currentWeapon];
                ctx.save();
                
                const attackProgress = (this.weaponCooldown / (weapon.speed * 60));
                const angle = Math.sin(attackProgress * Math.PI) * Math.PI;
                
                ctx.translate(10, -5 + bodyBob);
                ctx.rotate(angle);
                
                if (weapon.type === 'dual') {
                    ctx.fillStyle = weapon.color;
                    // 刀刃拖尾效果
                    const grad = ctx.createLinearGradient(0, -30, 0, 30);
                    grad.addColorStop(0, 'rgba(255, 68, 0, 0)');
                    grad.addColorStop(0.5, 'rgba(255, 68, 0, 0.8)');
                    grad.addColorStop(1, 'rgba(255, 68, 0, 0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(-10, -40, 20, 80);
                    
                    ctx.fillStyle = weapon.color;
                    ctx.fillRect(-2, -35, 4, 50);
                } else if (weapon.type === 'heavy') {
                    const grad = ctx.createLinearGradient(0, -60, 0, 10);
                    grad.addColorStop(0, 'rgba(150, 0, 255, 0)');
                    grad.addColorStop(0.5, 'rgba(150, 0, 255, 0.9)');
                    grad.addColorStop(1, 'rgba(150, 0, 255, 0)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(-20, -80, 40, 100);
                }
                
                ctx.restore();
            }
        }

        // ==================== 敌人类 ====================
        class Enemy {
            constructor(x, y, type, level) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 75;
                this.type = type;
                this.facing = -1;
                this.vx = 0;
                this.vy = 0;
                this.isBoss = false;
                this.stunned = 0;
                
                this.animFrame = 0;
                this.animState = 'idle';
                
                // 根据类型设置属性
                if (type === 'demon') {
                    this.maxHealth = 80 + level * 20;
                    this.damage = 20;
                    this.speed = 2;
                    this.color = '#ff2200';
                } else {
                    this.maxHealth = 50 + level * 15;
                    this.damage = 15;
                    this.speed = 3;
                    this.color = '#dddddd';
                }
                this.health = this.maxHealth;
                
                this.patrolStart = x - 150;
                this.patrolEnd = x + 150;
                this.alerted = false;
            }
            
            update(game) {
                this.animFrame++;
                
                if (this.stunned > 0) {
                    this.stunned--;
                    return;
                }
                
                const player = game.player;
                const dist = Utils.distance(this, player);
                
                // 检测玩家
                const canSeePlayer = dist < 250 && !player.dashing;
                
                if (canSeePlayer) {
                    this.alerted = true;
                    this.facing = player.x > this.x ? 1 : -1;
                    
                    // 追逐
                    if (dist > 50) {
                        this.vx = this.facing * this.speed;
                        this.animState = 'run';
                    } else {
                        this.vx = 0;
                        this.animState = 'attack';
                        // 攻击
                        if (this.animFrame % 60 === 0) {
                            player.takeDamage(this.damage, game);
                        }
                    }
                } else {
                    this.alerted = false;
                    this.animState = 'idle';
                    // 巡逻
                    this.x += this.vx;
                    if (this.x <= this.patrolStart || this.x >= this.patrolEnd) {
                        this.vx = this.x <= this.patrolStart ? this.speed : -this.speed;
                        this.facing = Math.sign(this.vx);
                    }
                }
                
                // 应用速度
                this.x += this.vx;
                
                // 重力
                this.vy += CONFIG.GRAVITY;
                this.y += this.vy;
                
                // 地面碰撞
                for (const platform of game.platforms) {
                    if (Utils.rectIntersect(this, platform)) {
                        if (this.vy > 0) {
                            this.y = platform.y - this.height;
                            this.vy = 0;
                        }
                    }
                }
            }
            
            takeDamage(amount, game, isCrit = false) {
                this.health -= amount;
                game.addFloatingText(
                    isCrit ? '暴击 ' + Math.floor(amount) : Math.floor(amount),
                    this.x + this.width/2,
                    this.y,
                    isCrit ? 'critical' : 'normal'
                );
                game.addParticle(this.x + this.width/2, this.y + this.height/2, '#ff0000', 5, 5);
                
                if (this.health <= 0) {
                    game.score += this.isBoss ? 1000 : 100;
                    game.addParticle(this.x, this.y, this.color, 20, 8);
                    const index = game.enemies.indexOf(this);
                    if (index > -1) game.enemies.splice(index, 1);
                }
            }
            
            draw(ctx) {
                ctx.save();
                
                if (this.stunned > 0) {
                    ctx.globalAlpha = 0.6;
                }
                
                const centerX = this.x + this.width/2;
                const centerY = this.y + this.height/2;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                if (this.facing === -1) {
                    ctx.scale(-1, 1);
                }
                
                // 身体动画
                const bob = this.animState === 'run' ? Math.sin(this.animFrame * 0.3) * 3 : 0;
                
                // 腿部
                ctx.fillStyle = this.type === 'demon' ? '#220000' : '#333';
                const legOffset = this.animState === 'run' ? Math.sin(this.animFrame * 0.4) * 8 : 0;
                ctx.fillRect(-7, 12 + bob + Math.abs(legOffset), 5, 22);
                ctx.fillRect(2, 12 + bob - Math.abs(legOffset), 5, 22);
                
                // 身体
                const bodyGrad = ctx.createLinearGradient(0, -15, 0, 15);
                if (this.type === 'demon') {
                    bodyGrad.addColorStop(0, '#440000');
                    bodyGrad.addColorStop(0.5, '#880000');
                    bodyGrad.addColorStop(1, '#440000');
                } else {
                    bodyGrad.addColorStop(0, '#555');
                    bodyGrad.addColorStop(0.5, '#777');
                    bodyGrad.addColorStop(1, '#555');
                }
                ctx.fillStyle = bodyGrad;
                ctx.fillRect(-11, -15 + bob, 22, 32);
                
                // 骨骼/恶魔纹路
                ctx.strokeStyle = this.type === 'demon' ? '#ff0000' : '#aaa';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -10 + bob);
                ctx.lineTo(0, 12 + bob);
                ctx.stroke();
                
                // 头部
                ctx.translate(0, -22 + bob);
                
                // 角或骷髅头
                if (this.type === 'demon') {
                    ctx.fillStyle = '#330000';
                    ctx.beginPath();
                    ctx.moveTo(-8, -5);
                    ctx.lineTo(-12, -18);
                    ctx.lineTo(-4, -8);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.moveTo(8, -5);
                    ctx.lineTo(12, -18);
                    ctx.lineTo(4, -8);
                    ctx.fill();
                }
                
                // 头
                ctx.fillStyle = this.type === 'demon' ? '#660000' : '#dddddd';
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // 眼睛
                ctx.fillStyle = this.alerted ? '#ff0000' : '#ffff00';
                ctx.beginPath();
                ctx.arc(-4, -2, 3, 0, Math.PI * 2);
                ctx.arc(4, -2, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // 武器
                if (this.type === 'demon') {
                    ctx.fillStyle = '#aa0000';
                    ctx.fillRect(12, -5, 6, 30);
                    ctx.fillStyle = '#444';
                    ctx.fillRect(10, 0, 10, 4);
                } else {
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(12, 5);
                    ctx.lineTo(25, -10);
                    ctx.stroke();
                }
                
                ctx.restore();
                
                // 血条
                const hpPercent = this.health / this.maxHealth;
                ctx.fillStyle = '#222';
                ctx.fillRect(this.x - 5, this.y - 15, this.width + 10, 6);
                ctx.fillStyle = hpPercent > 0.5 ? '#00ff00' : '#ff0000';
                ctx.fillRect(this.x - 5, this.y - 15, (this.width + 10) * hpPercent, 6);
                
                ctx.restore();
            }
        }

        // ==================== Boss类 ====================
        class Boss extends Enemy {
            constructor(x, y, level) {
                super(x, y, 'demon', level);
                this.isBoss = true;
                this.width = 80;
                this.height = 140;
                this.maxHealth = 800 + level * 200;
                this.health = this.maxHealth;
                this.damage = 40;
                this.phase = 1;
            }
            
            update(game) {
                super.update(game);
                
                // 阶段转换
                const hpPercent = this.health / this.maxHealth;
                if (hpPercent < 0.5 && this.phase === 1) {
                    this.phase = 2;
                    this.speed *= 1.5;
                    game.screenShake(10);
                }
                
                // Boss特殊攻击
                if (this.alerted && this.animFrame % 180 === 0) {
                    // 火焰喷射
                    game.addEffect('firebreath', this.x + this.facing * 50, this.y + 50);
                    if (Math.abs(game.player.y - this.y) < 100 && 
                        (this.facing === 1 && game.player.x > this.x) ||
                        (this.facing === -1 && game.player.x < this.x)) {
                        game.player.takeDamage(30, game);
                    }
                }
            }
            
            draw(ctx) {
                const time = Date.now() * 0.001;
                ctx.save();
                
                const centerX = this.x + this.width/2;
                const centerY = this.y + this.height/2;
                
                ctx.translate(centerX, centerY);
                if (this.facing === -1) {
                    ctx.scale(-1, 1);
                }
                
                // Boss动画参数
                const breathe = Math.sin(time * 1.5) * 0.05 + 1;
                const bob = Math.sin(this.animFrame * 0.12) * 6;
                const phase2 = this.phase === 2;
                
                // ========== 巨大翅膀 ==========
                ctx.save();
                ctx.translate(-40, -30 + bob);
                const wingFlap = Math.sin(time * 2) * 0.1;
                ctx.rotate(wingFlap);
                ctx.scale(breathe, breathe);
                
                const wingGrad = ctx.createLinearGradient(0, 0, -80, 60);
                wingGrad.addColorStop(0, '#1a0000');
                wingGrad.addColorStop(0.4, '#330000');
                wingGrad.addColorStop(0.8, '#220000');
                wingGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = wingGrad;
                
                // 巨大翅膀轮廓
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-80, -40);
                ctx.quadraticCurveTo(-100, 0, -90, 40);
                ctx.quadraticCurveTo(-60, 60, -20, 50);
                ctx.lineTo(0, 30);
                ctx.closePath();
                ctx.fill();
                
                // 翅膀脉络发光
                ctx.strokeStyle = phase2 ? '#ff0000' : '#660000';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = phase2 ? 15 : 5;
                ctx.beginPath();
                ctx.moveTo(-10, 5);
                ctx.lineTo(-70, -30);
                ctx.moveTo(-10, 15);
                ctx.lineTo(-80, 0);
                ctx.moveTo(-5, 25);
                ctx.lineTo(-60, 30);
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                ctx.restore();
                
                // 右翅膀
                ctx.save();
                ctx.translate(40, -30 + bob);
                ctx.rotate(-wingFlap);
                ctx.scale(-breathe, breathe);
                ctx.fillStyle = wingGrad;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-80, -40);
                ctx.quadraticCurveTo(-100, 0, -90, 40);
                ctx.quadraticCurveTo(-60, 60, -20, 50);
                ctx.lineTo(0, 30);
                ctx.closePath();
                ctx.fill();
                
                ctx.strokeStyle = phase2 ? '#ff0000' : '#660000';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = phase2 ? 15 : 5;
                ctx.beginPath();
                ctx.moveTo(-10, 5);
                ctx.lineTo(-70, -30);
                ctx.moveTo(-10, 15);
                ctx.lineTo(-80, 0);
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.restore();
                
                // ========== 尾巴 ==========
                ctx.save();
                ctx.translate(0, 60 + bob);
                const tailSway = Math.sin(time * 1.5) * 0.15;
                ctx.rotate(tailSway);
                
                const tailGrad = ctx.createLinearGradient(0, 0, 0, 60);
                tailGrad.addColorStop(0, '#330000');
                tailGrad.addColorStop(0.5, '#440000');
                tailGrad.addColorStop(1, '#220000');
                ctx.fillStyle = tailGrad;
                
                ctx.beginPath();
                ctx.moveTo(-15, 0);
                ctx.quadraticCurveTo(-25, 30, -20, 60);
                ctx.quadraticCurveTo(0, 70, 20, 60);
                ctx.quadraticCurveTo(25, 30, 15, 0);
                ctx.closePath();
                ctx.fill();
                
                // 尾巴尖刺
                ctx.fillStyle = phase2 ? '#ff2200' : '#660000';
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-15 + i * 7, 55);
                    ctx.lineTo(-13 + i * 7, 75 + i * 3);
                    ctx.lineTo(-11 + i * 7, 55);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();
                
                // ========== 巨大的角 ==========
                const hornGlow = phase2 ? 1 : 0.6 + Math.sin(time * 3) * 0.2;
                ctx.fillStyle = '#110000';
                
                // 左角
                ctx.beginPath();
                ctx.moveTo(-30, -50 + bob);
                ctx.quadraticCurveTo(-50, -80 + bob, -55, -120 + bob);
                ctx.quadraticCurveTo(-35, -100 + bob, -20, -60 + bob);
                ctx.closePath();
                ctx.fill();
                
                // 左角发光纹路
                ctx.strokeStyle = `rgba(255, 68, 0, ${hornGlow})`;
                ctx.lineWidth = 3;
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.moveTo(-40, -70 + bob);
                ctx.lineTo(-48, -100 + bob);
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // 右角
                ctx.fillStyle = '#110000';
                ctx.beginPath();
                ctx.moveTo(30, -50 + bob);
                ctx.quadraticCurveTo(50, -80 + bob, 55, -120 + bob);
                ctx.quadraticCurveTo(35, -100 + bob, 20, -60 + bob);
                ctx.closePath();
                ctx.fill();
                
                ctx.strokeStyle = `rgba(255, 68, 0, ${hornGlow})`;
                ctx.lineWidth = 3;
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.moveTo(40, -70 + bob);
                ctx.lineTo(48, -100 + bob);
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // ========== 身体 ==========
                ctx.save();
                ctx.translate(0, bob);
                ctx.scale(breathe, breathe);
                
                // 身体主体
                const bodyGrad = ctx.createLinearGradient(-40, -60, 40, 60);
                bodyGrad.addColorStop(0, '#1a0000');
                bodyGrad.addColorStop(0.3, '#330000');
                bodyGrad.addColorStop(0.5, phase2 ? '#550000' : '#440000');
                bodyGrad.addColorStop(0.7, '#330000');
                bodyGrad.addColorStop(1, '#1a0000');
                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.moveTo(-40, -60);
                ctx.quadraticCurveTo(-50, 0, -40, 60);
                ctx.quadraticCurveTo(0, 70, 40, 60);
                ctx.quadraticCurveTo(50, 0, 40, -60);
                ctx.quadraticCurveTo(0, -70, -40, -60);
                ctx.closePath();
                ctx.fill();
                
                // 发光纹路
                ctx.strokeStyle = phase2 ? '#ff0000' : '#aa0000';
                ctx.lineWidth = 4;
                const veinGlow = 0.5 + Math.sin(time * 4) * 0.3;
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 15 + veinGlow * 10;
                ctx.globalAlpha = 0.7 + veinGlow * 0.3;
                
                // 中央脊柱
                ctx.beginPath();
                ctx.moveTo(0, -50);
                ctx.lineTo(0, 55);
                ctx.stroke();
                
                // 胸口符文
                ctx.beginPath();
                ctx.moveTo(-20, -20);
                ctx.lineTo(0, 10);
                ctx.lineTo(20, -20);
                ctx.lineTo(15, 0);
                ctx.lineTo(-15, 0);
                ctx.closePath();
                ctx.stroke();
                
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                ctx.restore();
                
                // ========== 头部 ==========
                ctx.save();
                ctx.translate(0, -75 + bob);
                ctx.scale(breathe * 0.9, breathe * 0.9);
                
                ctx.fillStyle = '#220000';
                ctx.beginPath();
                ctx.ellipse(0, 0, 30, 35, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 头部装甲
                ctx.fillStyle = '#110000';
                ctx.beginPath();
                ctx.moveTo(-25, -20);
                ctx.lineTo(25, -20);
                ctx.lineTo(20, 5);
                ctx.lineTo(-20, 5);
                ctx.closePath();
                ctx.fill();
                
                // 眼睛 - 巨大恐惧
                const eyePulse = 0.8 + Math.sin(time * 3) * 0.2;
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 25 + eyePulse * 15;
                ctx.fillStyle = phase2 ? '#ff0000' : '#cc0000';
                
                ctx.beginPath();
                ctx.ellipse(-12, -5, 8, 10, -0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(12, -5, 8, 10, 0.2, 0, Math.PI * 2);
                ctx.fill();
                
                // 瞳孔
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(-12, -5, 4, 0, Math.PI * 2);
                ctx.arc(12, -5, 4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                // 嘴巴
                ctx.fillStyle = '#110000';
                ctx.beginPath();
                ctx.moveTo(-15, 15);
                ctx.quadraticCurveTo(0, 25, 15, 15);
                ctx.quadraticCurveTo(0, 35, -15, 15);
                ctx.fill();
                
                // 狡牙
                ctx.fillStyle = '#ffffaa';
                for (let i = 0; i < 6; i++) {
                    ctx.beginPath();
                    ctx.moveTo(-12 + i * 4, 16);
                    ctx.lineTo(-10 + i * 4, 25);
                    ctx.lineTo(-8 + i * 4, 16);
                    ctx.fill();
                }
                
                ctx.restore();
                
                // ========== 巨大的地狱武器 ==========
                ctx.save();
                ctx.translate(50, 10 + bob);
                ctx.rotate(-0.2 + Math.sin(time) * 0.05);
                
                // 巨大剑柄
                ctx.fillStyle = '#0a0000';
                ctx.fillRect(-12, -15, 24, 30);
                ctx.fillStyle = '#220000';
                ctx.fillRect(-10, -12, 20, 24);
                
                // 巨大护手
                ctx.fillStyle = '#110000';
                ctx.beginPath();
                ctx.moveTo(-20, 5);
                ctx.lineTo(20, 5);
                ctx.lineTo(15, 25);
                ctx.lineTo(-15, 25);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#ff4400';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-15, 8);
                ctx.lineTo(-10, 20);
                ctx.moveTo(15, 8);
                ctx.lineTo(10, 20);
                ctx.stroke();
                
                // 巨大剑身
                const bladeGrad = ctx.createLinearGradient(-15, 0, 15, -120);
                bladeGrad.addColorStop(0, '#110000');
                bladeGrad.addColorStop(0.3, '#330000');
                bladeGrad.addColorStop(0.6, phase2 ? '#660000' : '#440000');
                bladeGrad.addColorStop(0.8, '#ff2200');
                bladeGrad.addColorStop(1, '#ff8800');
                ctx.fillStyle = bladeGrad;
                
                ctx.beginPath();
                ctx.moveTo(-15, 15);
                ctx.lineTo(-12, -100);
                ctx.quadraticCurveTo(-6, -120, 0, -130);
                ctx.quadraticCurveTo(6, -120, 12, -100);
                ctx.lineTo(15, 15);
                ctx.closePath();
                ctx.fill();
                
                // 剑身发光纹路
                ctx.strokeStyle = phase2 ? '#ff6600' : '#aa0000';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#ff4400';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(0, 15);
                ctx.lineTo(0, -115);
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // 剑身装饰符文
                ctx.fillStyle = `rgba(255, 68, 0, ${0.6 + Math.sin(time * 4) * 0.3})`;
                for (let i = 0; i < 4; i++) {
                    ctx.beginPath();
                    ctx.arc(0, -20 - i * 25, 5 + i, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
                
                ctx.restore();
            }
        }

        // ==================== 平台类 ====================
        class Platform {
            constructor(x, y, width, height, type = 'rock') {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type;
            }
            
            draw(ctx) {
                if (this.type === 'ground') {
                    // 岩浆地面
                    const grad = ctx.createLinearGradient(0, this.y, 0, this.y + this.height);
                    grad.addColorStop(0, '#440000');
                    grad.addColorStop(0.5, '#880000');
                    grad.addColorStop(1, '#ff2200');
                    ctx.fillStyle = grad;
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    
                    // 岩浆气泡
                    ctx.fillStyle = 'rgba(255, 100, 0, 0.5)';
                    for (let i = 0; i < 5; i++) {
                        const bx = (this.x + i * 200 + Date.now() * 0.1) % this.width;
                        const by = this.y + 20 + Math.sin(Date.now() * 0.01 + i) * 10;
                        ctx.beginPath();
                        ctx.arc(bx, by, 10 + Math.sin(Date.now() * 0.02 + i) * 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    // 浮空岩石
                    const grad = ctx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
                    grad.addColorStop(0, '#3a3a3a');
                    grad.addColorStop(0.5, '#2a2a2a');
                    grad.addColorStop(1, '#1a1a1a');
                    ctx.fillStyle = grad;
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    
                    // 边缘发光
                    ctx.strokeStyle = '#ff4400';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + this.width, this.y);
                    ctx.stroke();
                    
                    // 裂纹纹理
                    ctx.strokeStyle = 'rgba(255, 68, 0, 0.3)';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(this.x + i * this.width/3, this.y);
                        ctx.lineTo(this.x + i * this.width/3 + 20, this.y + this.height);
                        ctx.stroke();
                    }
                }
            }
        }

        // ==================== 投射物类 ====================
        class Projectile {
            constructor(x, y, vx, vy, damage, color, owner, type = 'normal') {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.damage = damage;
                this.color = color;
                this.owner = owner;
                this.type = type;
                this.active = true;
                this.life = 120;
            }
            
            update(game) {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                
                if (this.life <= 0) {
                    this.active = false;
                    return;
                }
                
                // 重力影响（火球）
                if (this.type === 'fireball') {
                    this.vy += 0.15;
                }
                
                // 边界检查
                if (this.x < 0 || this.x > 3000 || this.y > game.canvas.height) {
                    this.active = false;
                }
                
                // 碰撞检测
                if (this.owner === 'player') {
                    game.enemies.forEach(enemy => {
                        if (Utils.rectIntersect(this, enemy)) {
                            enemy.takeDamage(this.damage, game);
                            this.active = false;
                            game.addParticle(this.x, this.y, this.color, 8, 5);
                        }
                    });
                }
            }
            
            draw(ctx) {
                ctx.save();
                
                if (this.type === 'fireball') {
                    // 火球特效
                    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 15);
                    grad.addColorStop(0, '#ffff00');
                    grad.addColorStop(0.3, '#ff4400');
                    grad.addColorStop(1, 'rgba(255, 0, 0, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 15, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

        // ==================== 粒子类 ====================
        class Particle {
            constructor(x, y, color, speed = 5) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * speed;
                this.vy = (Math.random() - 0.5) * speed;
                this.color = color;
                this.life = 40;
                this.maxLife = 40;
                this.size = Math.random() * 6 + 2;
                this.gravity = 0.2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.life--;
                this.size *= 0.95;
            }
            
            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        // ==================== 特效类 ====================
        class Effect {
            constructor(type, x, y, options = {}) {
                this.type = type;
                this.x = x;
                this.y = y;
                this.options = options;
                this.life = 30;
                this.maxLife = 30;
            }
            
            update() {
                this.life--;
            }
            
            draw(ctx) {
                const progress = 1 - this.life / this.maxLife;
                
                ctx.save();
                
                switch(this.type) {
                    case 'slash':
                        ctx.strokeStyle = this.options.color || '#fff';
                        ctx.lineWidth = 4;
                        ctx.globalAlpha = 1 - progress;
                        ctx.beginPath();
                        const size = this.options.size || 60;
                        ctx.arc(this.x, this.y, progress * size, -Math.PI/3, Math.PI/3);
                        ctx.stroke();
                        break;
                        
                    case 'dash':
                        ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                        ctx.globalAlpha = 1 - progress;
                        for (let i = 0; i < 3; i++) {
                            ctx.fillRect(this.x - this.options.facing * i * 30, this.y - 20, 40, 40);
                        }
                        break;
                        
                    case 'whirlwind':
                        ctx.strokeStyle = '#00ff88';
                        ctx.lineWidth = 3;
                        ctx.globalAlpha = 1 - progress;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, progress * 120, 0, Math.PI * 2);
                        ctx.stroke();
                        break;
                        
                    case 'lightning':
                        ctx.strokeStyle = '#ffff00';
                        ctx.lineWidth = 4;
                        ctx.globalAlpha = 1 - progress;
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y);
                        for (let i = 0; i < 10; i++) {
                            ctx.lineTo(
                                this.x + this.options.facing * i * (this.options.distance/10) + (Math.random()-0.5)*20,
                                this.y + (Math.random()-0.5)*40
                            );
                        }
                        ctx.stroke();
                        break;
                        
                    case 'deathgrip':
                        ctx.fillStyle = '#6600cc';
                        ctx.globalAlpha = Math.sin(progress * Math.PI) * 0.5;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, progress * 150, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'cast':
                        ctx.fillStyle = this.options.color;
                        ctx.globalAlpha = 1 - progress;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, progress * 40, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                        
                    case 'jump':
                        ctx.fillStyle = '#ff4400';
                        ctx.globalAlpha = 1 - progress;
                        for (let i = 0; i < 8; i++) {
                            const angle = (i / 8) * Math.PI;
                            const dist = progress * 30;
                            ctx.fillRect(
                                this.x + Math.cos(angle) * dist,
                                this.y + Math.sin(angle) * dist * 0.5,
                                4, 4
                            );
                        }
                        break;
                }
                
                ctx.restore();
            }
        }

        // ==================== 浮动文字类 ====================
        class FloatingText {
            constructor(text, x, y, type = 'normal') {
                this.text = text;
                this.x = x;
                this.y = y;
                this.type = type;
                this.life = 40;
                this.vy = -2;
            }
            
            update() {
                this.y += this.vy;
                this.life--;
            }
            
            draw(ctx, camera) {
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;
                
                ctx.save();
                ctx.font = this.type === 'critical' ? 'bold 24px Arial' : 'bold 18px Arial';
                ctx.fillStyle = this.type === 'critical' ? '#ff0000' : '#ffaa00';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.strokeText(this.text, screenX, screenY);
                ctx.fillText(this.text, screenX, screenY);
                ctx.restore();
            }
        }

        // ==================== 启动游戏 ====================
        const game = new Game();
    </script>
</body>
