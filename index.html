<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>翠客信条1.0</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            background: #0a0a0a;
            box-shadow: 0 0 50px rgba(255, 50, 0, 0.5);
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* HUD */
        .hud-top {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .avatar-frame {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #ff4400;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 68, 0, 0.6);
        }
        
        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .avatar-frame::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 2px solid rgba(255, 200, 0, 0.5);
        }
        
        .bars {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .bar-container {
            width: 200px;
            height: 18px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            border-radius: 9px;
            overflow: hidden;
            position: relative;
        }
        
        .bar-fill {
            height: 100%;
            transition: width 0.3s ease;
        }
        
        .health-fill {
            background: linear-gradient(90deg, #8b0000, #ff0000, #ff4400);
        }
        
        .stamina-fill {
            background: linear-gradient(90deg, #004400, #00aa00, #44ff44);
        }
        
        .mana-fill {
            background: linear-gradient(90deg, #000088, #4444ff, #00aaff);
        }
        
        .bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            font-weight: bold;
        }
        
        .game-stats {
            text-align: right;
        }
        
        .level-badge {
            background: linear-gradient(135deg, #8b0000, #ff0000);
            padding: 8px 20px;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        .score-display {
            color: #ffd700;
            font-size: 18px;
            margin-top: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        
        /* 技能栏 - 桌面端 */
        .skills-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
        }
        
        .skill-slot {
            width: 50px;
            height: 50px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #666;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            pointer-events: auto;
            cursor: pointer;
        }
        
        .skill-slot.active {
            border-color: #ff4400;
            box-shadow: 0 0 15px rgba(255, 68, 0, 0.6);
        }
        
        .skill-slot.cooldown {
            opacity: 0.5;
        }
        
        .skill-icon {
            font-size: 22px;
        }
        
        .skill-key {
            position: absolute;
            bottom: 2px;
            font-size: 9px;
            color: #aaa;
        }
        
        .cooldown-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            transition: height 0.1s;
        }
        
        /* 移动端技能栏 - 位于控制区上方 */
        .skills-bar-mobile {
            display: none;
        }
        
        /* 动态背景层 */
        .bg-layers {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .volcano-glow {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse at center bottom, rgba(255, 80, 0, 0.4) 0%, transparent 70%);
            animation: volcanoPulse 4s ease-in-out infinite;
        }
        
        @keyframes volcanoPulse {
            0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }
        
        /* 武器切换 */
        .weapon-display {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ff4400;
            border-radius: 10px;
            padding: 8px 12px;
            color: #fff;
            font-size: 13px;
            pointer-events: auto;
        }
        
        .weapon-name {
            color: #ffaa00;
            font-weight: bold;
        }
        
        /* 触摸控制 */
        .touch-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 185px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 15px 20px 15px;
            z-index: 60;
        }
        
        .dpad {
            display: flex;
            gap: 10px;
            align-items: center;
            pointer-events: auto;
        }
        
        .btn {
            width: 62px;
            height: 62px;
            background: rgba(139, 0, 0, 0.5);
            border: 2px solid rgba(255, 68, 0, 0.7);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: #ff4400;
            cursor: pointer;
            transition: transform 0.1s;
            backdrop-filter: blur(5px);
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        .btn:active {
            background: rgba(255, 68, 0, 0.6);
            transform: scale(0.92);
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            pointer-events: auto;
        }
        
        .btn-attack {
            background: rgba(255, 0, 0, 0.4);
            border-color: rgba(255, 0, 0, 0.8);
            color: #ff0000;
            width: 68px;
            height: 68px;
            font-size: 28px;
        }
        
        .btn-jump {
            background: rgba(0, 100, 255, 0.4);
            border-color: rgba(0, 100, 255, 0.8);
            color: #4488ff;
        }
        
        .btn-dash {
            background: rgba(255, 200, 0, 0.4);
            border-color: rgba(255, 200, 0, 0.8);
            color: #ffcc00;
        }
        
        /* 移动端技能栏 */
        .skills-bar-mobile {
            position: absolute;
            bottom: 195px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: center;
            gap: 12px;
            pointer-events: auto;
            padding: 0 15px;
            z-index: 50;
        }
        
        .skills-bar-mobile .skill-slot {
            width: 58px;
            height: 58px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #666;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            pointer-events: auto;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.1s;
            user-select: none;
        }
        
        .skills-bar-mobile .skill-slot:active {
            transform: scale(0.95);
            border-color: #ff4400;
            box-shadow: 0 0 15px rgba(255, 68, 0, 0.5);
        }
        
        .skills-bar-mobile .skill-icon {
            font-size: 26px;
            pointer-events: none;
        }
        
        .skills-bar-mobile .cooldown-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 0 0 12px 12px;
            pointer-events: none;
        }
        
        /* 屏幕 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a0000, #0a0a0a, #1a0000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 100;
        }
        
        .screen.hidden {
            display: none;
        }
        
        .game-title {
            font-size: 56px;
            background: linear-gradient(90deg, #ff0000, #ff4400, #ff8800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
            margin-bottom: 20px;
            letter-spacing: 8px;
            font-weight: bold;
        }
        
        .character-avatar-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #ff4400;
            margin-bottom: 30px;
            object-fit: cover;
            box-shadow: 0 0 40px rgba(255, 68, 0, 0.7);
        }
        
        .start-btn {
            padding: 18px 60px;
            font-size: 26px;
            background: linear-gradient(90deg, #8b0000, #ff0000, #ff4400);
            border: none;
            border-radius: 35px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }
        
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.9);
        }
        
        .instructions {
            color: #888;
            margin-top: 30px;
            text-align: center;
            line-height: 2;
            font-size: 14px;
        }
        
        .instructions p {
            margin: 5px 0;
        }
        
        .key-hint {
            display: inline-block;
            background: #333;
            padding: 3px 10px;
            border-radius: 5px;
            margin: 0 3px;
            color: #ff8800;
        }
        
        .hidden-mobile {
            display: none;
        }
        
        @media (min-width: 768px) {
            .touch-controls {
                display: none;
            }
            .skills-bar-mobile {
                display: none;
            }
            .hidden-mobile {
                display: block;
            }
            .skills-bar {
                display: flex !important;
                bottom: 20px;
            }
            .weapon-display {
                bottom: 20px;
            }
        }
        
        @media (max-width: 767px) {
            .skills-bar {
                display: none !important;
            }
            .skills-bar-mobile {
                display: flex;
            }
            .weapon-display {
                bottom: 125px;
                right: 10px;
                padding: 6px 10px;
                font-size: 12px;
            }
            .hud-top {
                top: 5px;
                left: 5px;
                right: 5px;
            }
            .avatar-frame {
                width: 50px;
                height: 50px;
            }
            .bar-container {
                width: 140px;
                height: 14px;
            }
            .boss-hp-bar {
                top: 70px;
                width: 80%;
            }
        }
        
        /* 小屏幕手机适配 */
        @media (max-width: 380px) {
            .skills-bar-mobile {
                bottom: 190px;
                gap: 8px;
            }
            .skills-bar-mobile .skill-slot {
                width: 52px;
                height: 52px;
            }
            .skills-bar-mobile .skill-icon {
                font-size: 22px;
            }
            .btn {
                width: 56px;
                height: 56px;
                font-size: 20px;
            }
            .btn-attack {
                width: 62px;
                height: 62px;
                font-size: 24px;
            }
            .touch-controls {
                padding: 0 10px 15px 10px;
            }
        }
        
        /* 特效文字 */
        @keyframes criticalHit {
            0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
            20% { transform: translateX(-50%) scale(1.5); opacity: 1; }
            100% { transform: translateX(-50%) scale(1) translateY(-50px); opacity: 0; }
        }
        
        .damage-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            animation: criticalHit 1s ease-out forwards;
            pointer-events: none;
        }
        
        .damage-text.critical {
            color: #ff0000;
            font-size: 32px;
        }
        
        .damage-text.normal {
            color: #ffaa00;
        }
        
        /* Boss血条 */
        .boss-hp-bar {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            max-width: 500px;
        }
        
        .boss-name {
            color: #ff0000;
            font-size: 18px;
            text-align: center;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
        }
        
        .boss-hp-container {
            height: 25px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #ff0000;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .boss-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #330000, #ff0000, #ff4400);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div class="hud-top">
                <div class="player-info">
                    <div class="avatar-frame">
                        <img src="cuicui.jpg" alt="翠翠">
                    </div>
                    <div class="bars">
                        <div class="bar-container">
                            <div class="bar-fill health-fill" id="healthFill" style="width: 100%"></div>
                            <div class="bar-text"><span id="hpText">100/100</span></div>
                        </div>
                        <div class="bar-container">
                            <div class="bar-fill stamina-fill" id="staminaFill" style="width: 100%"></div>
                            <div class="bar-text">耐力</div>
                        </div>
                        <div class="bar-container">
                            <div class="bar-fill mana-fill" id="manaFill" style="width: 100%"></div>
                            <div class="bar-text">魔力</div>
                        </div>
                    </div>
                </div>
                <div class="game-stats">
                    <div class="level-badge">关卡 <span id="levelNum">1</span></div>
                    <div class="score-display">得分: <span id="score">0</span></div>
                </div>
            </div>
            
            <div class="boss-hp-bar hidden" id="bossBar">
                <div class="boss-name">地狱领主</div>
                <div class="boss-hp-container">
                    <div class="boss-hp-fill" id="bossHpFill" style="width: 100%"></div>
                </div>
            </div>
            
            <!-- 桌面端技能栏 -->
            <div class="skills-bar">
                <div class="skill-slot" id="skill1" onclick="game.useSkill(0)">
                    <div class="skill-icon">🔥</div>
                    <div class="skill-key">Q</div>
                    <div class="cooldown-overlay" id="cd1" style="height: 0%"></div>
                </div>
                <div class="skill-slot" id="skill2" onclick="game.useSkill(1)">
                    <div class="skill-icon">⚡</div>
                    <div class="skill-key">W</div>
                    <div class="cooldown-overlay" id="cd2" style="height: 0%"></div>
                </div>
                <div class="skill-slot" id="skill3" onclick="game.useSkill(2)">
                    <div class="skill-icon">🌪️</div>
                    <div class="skill-key">E</div>
                    <div class="cooldown-overlay" id="cd3" style="height: 0%"></div>
                </div>
                <div class="skill-slot" id="skill4" onclick="game.useSkill(3)">
                    <div class="skill-icon">💀</div>
                    <div class="skill-key">R</div>
                    <div class="cooldown-overlay" id="cd4" style="height: 0%"></div>
                </div>
            </div>
            
            <!-- 移动端技能栏 -->
            <div class="skills-bar-mobile">
                <div class="skill-slot" id="mobileSkill0" data-skill="0">
                    <div class="skill-icon">🔥</div>
                    <div class="cooldown-overlay" id="cd1m" style="height: 0%"></div>
                </div>
                <div class="skill-slot" id="mobileSkill1" data-skill="1">
                    <div class="skill-icon">⚡</div>
                    <div class="cooldown-overlay" id="cd2m" style="height: 0%"></div>
                </div>
                <div class="skill-slot" id="mobileSkill2" data-skill="2">
                    <div class="skill-icon">🌪️</div>
                    <div class="cooldown-overlay" id="cd3m" style="height: 0%"></div>
                </div>
                <div class="skill-slot" id="mobileSkill3" data-skill="3">
                    <div class="skill-icon">💀</div>
                    <div class="cooldown-overlay" id="cd4m" style="height: 0%"></div>
                </div>
            </div>
            
            <div class="weapon-display">
                <div>武器: <span class="weapon-name" id="weaponName">烈焰双刀</span></div>
                <div style="font-size: 12px; color: #888; margin-top: 3px;">按 <span class="key-hint">C</span> 切换</div>
            </div>
            
            <div class="touch-controls">
                <div class="dpad">
                    <div class="btn" id="btnLeft">◀</div>
                    <div class="btn" id="btnRight">▶</div>
                </div>
                <div class="action-buttons">
                    <div class="btn btn-dash" id="btnDash">⚡</div>
                    <div class="btn btn-jump" id="btnJump">▲</div>
                    <div class="btn btn-attack" id="btnAttack">⚔</div>
                </div>
            </div>
        </div>
        
        <div id="startScreen" class="screen">
            <h1 class="game-title">翠客信条</h1>
            <img src="cuicui.jpg" alt="翠翠" class="character-avatar-large">
            <button class="start-btn" onclick="game.start()">开始游戏</button>
            <div class="instructions">
                <p class="hidden-mobile">
                    <span class="key-hint">←→</span>移动 
                    <span class="key-hint">↑</span>跳跃 
                    <span class="key-hint">Z</span>攻击
                </p>
                <p class="hidden-mobile">
                    <span class="key-hint">X</span>冲刺 
                    <span class="key-hint">C</span>切换武器 
                    <span class="key-hint">QWER</span>技能
                </p>
                <p>🔥 火球术 | ⚡ 闪电冲刺 | 🌪️ 旋风斩 | 💀 死亡之握</p>
                <p style="color: #ff4400; margin-top: 15px;">在地狱中生存，击败所有恶魔！</p>
            </div>
        </div>
        
        <div id="gameOverScreen" class="screen hidden">
            <h1 class="game-title" style="color: #666;">你死了</h1>
            <p style="color: #fff; font-size: 20px; margin-bottom: 20px;">最终得分: <span id="finalScore">0</span></p>
            <button class="start-btn" onclick="game.restart()">重新挑战</button>
        </div>
        
        <div id="victoryScreen" class="screen hidden">
            <h1 class="game-title" style="color: #ffd700;">关卡完成！</h1>
            <p style="color: #fff; font-size: 20px; margin-bottom: 20px;">得分: <span id="victoryScore">0</span></p>
            <button class="start-btn" onclick="game.nextLevel()">下一关</button>
        </div>
        
        <div id="weaponSelectScreen" class="screen hidden">
            <h1 class="game-title" style="font-size: 36px;">选择武器</h1>
            <div style="display: flex; gap: 30px; margin-top: 30px;">
                <div class="weapon-card" onclick="game.selectWeapon(0)" style="cursor: pointer; padding: 20px; background: rgba(255,68,0,0.2); border: 2px solid #ff4400; border-radius: 15px; text-align: center;">
                    <div style="font-size: 40px;">🗡️</div>
                    <div style="color: #ff8800; font-size: 18px; margin-top: 10px;">烈焰双刀</div>
                    <div style="color: #888; font-size: 12px; margin-top: 5px;">快速连击</div>
                </div>
                <div class="weapon-card" onclick="game.selectWeapon(1)" style="cursor: pointer; padding: 20px; background: rgba(150,0,255,0.2); border: 2px solid #9600ff; border-radius: 15px; text-align: center;">
                    <div style="font-size: 40px;">⚔️</div>
                    <div style="color: #cc66ff; font-size: 18px; margin-top: 10px;">地狱大剑</div>
                    <div style="color: #888; font-size: 12px; margin-top: 5px;">重击破防</div>
                </div>
                <div class="weapon-card" onclick="game.selectWeapon(2)" style="cursor: pointer; padding: 20px; background: rgba(0,150,255,0.2); border: 2px solid #0096ff; border-radius: 15px; text-align: center;">
                    <div style="font-size: 40px;">🏹</div>
                    <div style="color: #66ccff; font-size: 18px; margin-top: 10px;">恶魔之弓</div>
                    <div style="color: #888; font-size: 12px; margin-top: 5px;">远程攻击</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            GRAVITY: 0.7,
            FRICTION: 0.85,
            
            // 武器配置
            WEAPONS: [
                { name: '烈焰双刀', damage: 25, speed: 0.15, range: 80, type: 'dual', color: '#ff4400' },
                { name: '地狱大剑', damage: 60, speed: 0.4, range: 110, type: 'heavy', color: '#9600ff' },
                { name: '恶魔之弓', damage: 40, speed: 0.3, range: 400, type: 'ranged', color: '#0096ff' }
            ],
            
            // 技能配置
            SKILLS: [
                { name: '火球术', damage: 80, mana: 30, cooldown: 180, icon: '🔥', color: '#ff4400' },
                { name: '闪电冲刺', damage: 50, mana: 25, cooldown: 150, icon: '⚡', color: '#ffff00' },
                { name: '旋风斩', damage: 100, mana: 40, cooldown: 240, icon: '🌪️', color: '#00ff88' },
                { name: '死亡之握', damage: 200, mana: 60, cooldown: 360, icon: '💀', color: '#6600cc' }
            ]
        };

        // ==================== 工具函数 ====================
        const Utils = {
            rectIntersect: (r1, r2) => 
                r1.x < r2.x + r2.width &&
                r1.x + r1.width > r2.x &&
                r1.y < r2.y + r2.height &&
                r1.y + r1.height > r2.y,
            
            distance: (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y),
            
            lerp: (start, end, t) => start + (end - start) * t,
            
            clamp: (val, min, max) => Math.min(Math.max(val, min), max),
            
            randomRange: (min, max) => Math.random() * (max - min) + min
        };

        // ==================== 游戏主类 ====================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.setupCanvas();
                
                this.level = 1;
                this.score = 0;
                this.isRunning = false;
                this.keys = {};
                this.camera = { x: 0, y: 0, shake: 0 };
                
                this.avatar = new Image();
                this.avatar.src = 'cuicui.jpg';
                
                this.initInput();
                this.setupTouchControls();
            }
            
            setupCanvas() {
                const resize = () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                };
                resize();
                window.addEventListener('resize', resize);
            }
            
            initInput() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    
                    // 武器切换
                    if (e.key === 'c' || e.key === 'C') {
                        this.switchWeapon();
                    }
                    
                    // 技能按键
                    if (e.key === 'q' || e.key === 'Q') this.useSkill(0);
                    if (e.key === 'w' || e.key === 'W') this.useSkill(1);
                    if (e.key === 'e' || e.key === 'E') this.useSkill(2);
                    if (e.key === 'r' || e.key === 'R') this.useSkill(3);
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
            }
            
            setupTouchControls() {
                // 绑定方向键和动作按钮
                const bindTouch = (id, key) => {
                    const btn = document.getElementById(id);
                    if (!btn) return;
                    
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        this.keys[key] = true;
                        btn.style.transform = 'scale(0.92)';
                        btn.style.background = btn.classList.contains('btn-attack') 
                            ? 'rgba(255, 0, 0, 0.6)' 
                            : 'rgba(255, 68, 0, 0.6)';
                    }, { passive: false });
                    
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        this.keys[key] = false;
                        btn.style.transform = '';
                        btn.style.background = '';
                    }, { passive: false });
                    
                    // 防止手指滑出按钮区域时卡住
                    btn.addEventListener('touchcancel', (e) => {
                        this.keys[key] = false;
                        btn.style.transform = '';
                        btn.style.background = '';
                    });
                };
                
                bindTouch('btnLeft', 'ArrowLeft');
                bindTouch('btnRight', 'ArrowRight');
                bindTouch('btnJump', 'ArrowUp');
                bindTouch('btnAttack', 'z');
                bindTouch('btnDash', 'x');
                
                // 绑定移动端技能按钮 - 使用 touchstart 确保可以和移动同时触发
                for (let i = 0; i < 4; i++) {
                    const skillBtn = document.getElementById('mobileSkill' + i);
                    if (skillBtn) {
                        skillBtn.addEventListener('touchstart', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            this.useSkill(i);
                            skillBtn.style.transform = 'scale(0.95)';
                            skillBtn.style.borderColor = '#ff4400';
                            setTimeout(() => {
                                skillBtn.style.transform = '';
                                skillBtn.style.borderColor = '';
                            }, 100);
                        }, { passive: false });
                        
                        // 防止 touchstart 触发 click
                        skillBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                        });
                    }
                }
            }
            
            start() {
                document.getElementById('startScreen').classList.add('hidden');
                this.initLevel();
                this.isRunning = true;
                this.loop();
            }
            
            restart() {
                this.level = 1;
                this.score = 0;
                document.getElementById('gameOverScreen').classList.add('hidden');
                this.initLevel();
                this.isRunning = true;
                this.loop();
            }
            
            nextLevel() {
                this.level++;
                document.getElementById('victoryScreen').classList.add('hidden');
                this.initLevel();
                this.isRunning = true;
                this.loop();
            }
            
            initLevel() {
                this.player = new Player(200, 300, this.avatar);
                this.platforms = this.generateHellPlatforms();
                this.enemies = this.generateEnemies();
                this.projectiles = [];
                this.particles = [];
                this.effects = [];
                this.floatingTexts = [];
                
                document.getElementById('levelNum').textContent = this.level;
                document.getElementById('bossBar').classList.add('hidden');
                
                this.updateUI();
            }
            
            generateHellPlatforms() {
                const platforms = [];
                const baseY = this.canvas.height - 80;
                
                // 岩浆地面
                platforms.push(new Platform(0, baseY, 3000, 80, 'ground'));
                
                // 浮空岩石平台
                const platformCount = 8 + this.level * 2;
                for (let i = 0; i < platformCount; i++) {
                    const x = 400 + i * 350;
                    const y = baseY - 150 - Math.random() * 250;
                    const width = 120 + Math.random() * 100;
                    platforms.push(new Platform(x, y, width, 25, 'rock'));
                }
                
                return platforms;
            }
            
            generateEnemies() {
                const enemies = [];
                const enemyCount = 4 + this.level * 2;
                
                for (let i = 0; i < enemyCount; i++) {
                    const x = 600 + i * 350 + Math.random() * 150;
                    const y = this.canvas.height - 200;
                    const type = Math.random() > 0.7 ? 'demon' : 'skeleton';
                    enemies.push(new Enemy(x, y, type, this.level));
                }
                
                // Boss关
                if (this.level % 3 === 0) {
                    enemies.push(new Boss(2000 + this.level * 100, this.canvas.height - 300, this.level));
                    document.getElementById('bossBar').classList.remove('hidden');
                }
                
                return enemies;
            }
            
            switchWeapon() {
                this.player.switchWeapon();
            }
            
            selectWeapon(index) {
                this.player.currentWeapon = index;
                document.getElementById('weaponSelectScreen').classList.add('hidden');
                document.getElementById('weaponName').textContent = CONFIG.WEAPONS[index].name;
                this.isRunning = true;
                this.loop();
            }
            
            useSkill(index) {
                if (!this.player) return;
                this.player.useSkill(index, this);
            }
            
            update() {
                if (!this.isRunning) return;
                
                // 相机震动衰减
                this.camera.shake *= 0.9;
                
                // 更新玩家
                this.player.update(this);
                
                // 更新相机
                this.camera.x = Utils.lerp(this.camera.x, 
                    this.player.x - this.canvas.width / 3, 0.1);
                this.camera.y = Utils.lerp(this.camera.y, 
                    this.player.y - this.canvas.height / 2, 0.1);
                this.camera.x = Math.max(0, this.camera.x);
                
                // 更新敌人
                this.enemies.forEach(e => e.update(this));
                
                // 更新投射物
                this.projectiles = this.projectiles.filter(p => {
                    p.update(this);
                    return p.active;
                });
                
                // 更新粒子
                this.particles = this.particles.filter(p => {
                    p.update();
                    return p.life > 0;
                });
                
                // 更新特效
                this.effects = this.effects.filter(e => {
                    e.update();
                    return e.life > 0;
                });
                
                // 更新浮动文字
                this.floatingTexts = this.floatingTexts.filter(t => {
                    t.update();
                    return t.life > 0;
                });
                
                // 检查胜利
                if (this.enemies.length === 0) {
                    this.victory();
                }
                
                // 检查失败
                if (this.player.health <= 0) {
                    this.gameOver();
                }
                
                this.updateUI();
            }
            
            draw() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制地狱背景
                this.drawHellBackground(ctx);
                
                ctx.save();
                
                // 相机震动
                const shakeX = (Math.random() - 0.5) * this.camera.shake;
                const shakeY = (Math.random() - 0.5) * this.camera.shake;
                ctx.translate(-this.camera.x + shakeX, -this.camera.y + shakeY);
                
                // 绘制平台
                this.platforms.forEach(p => p.draw(ctx));
                
                // 绘制投射物
                this.projectiles.forEach(p => p.draw(ctx));
                
                // 绘制敌人
                this.enemies.forEach(e => e.draw(ctx));
                
                // 绘制玩家
                this.player.draw(ctx);
                
                // 绘制粒子
                this.particles.forEach(p => p.draw(ctx));
                
                // 绘制特效
                this.effects.forEach(e => e.draw(ctx));
                
                ctx.restore();
                
                // 绘制浮动文字（UI层）
                this.floatingTexts.forEach(t => t.draw(ctx, this.camera));
            }
            
            drawHellBackground(ctx) {
                const time = Date.now() * 0.001;
                const w = this.canvas.width;
                const h = this.canvas.height;
                
                // 1. 天空渐变 - 更丰富的颜色层次
                const skyGrad = ctx.createLinearGradient(0, 0, 0, h);
                skyGrad.addColorStop(0, '#0a0000');
                skyGrad.addColorStop(0.3, '#1a0005');
                skyGrad.addColorStop(0.6, '#2a0008');
                skyGrad.addColorStop(1, '#3a0008');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, w, h);
                
                // 2. 血月
                const moonX = w * 0.7 - (this.camera.x * 0.05);
                const moonY = h * 0.2;
                const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 120);
                moonGrad.addColorStop(0, 'rgba(255, 60, 0, 0.9)');
                moonGrad.addColorStop(0.4, 'rgba(200, 30, 0, 0.5)');
                moonGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = moonGrad;
                ctx.beginPath();
                ctx.arc(moonX, moonY, 120, 0, Math.PI * 2);
                ctx.fill();
                
                // 月亮光晕
                ctx.fillStyle = 'rgba(255, 40, 0, 0.15)';
                ctx.beginPath();
                ctx.arc(moonX, moonY, 200, 0, Math.PI * 2);
                ctx.fill();
                
                // 3. 远景山脉（视差0.1）
                ctx.save();
                const farMountains = (x) => {
                    return Math.sin(x * 0.005) * 100 + Math.sin(x * 0.01) * 50 + 150;
                };
                ctx.fillStyle = '#0d0202';
                ctx.beginPath();
                ctx.moveTo(0, h);
                for (let x = 0; x <= w + 200; x += 50) {
                    const worldX = x + this.camera.x * 0.1;
                    ctx.lineTo(x, h - farMountains(worldX));
                }
                ctx.lineTo(w, h);
                ctx.fill();
                
                // 4. 中景火山（视差0.25）
                for (let i = 0; i < 3; i++) {
                    const volcanoX = (i * 800 + 200) - (this.camera.x * 0.25) % 2400;
                    const volcanoH = 350 + i * 50;
                    
                    // 火山主体
                    const volcanoGrad = ctx.createLinearGradient(volcanoX, h - volcanoH, volcanoX, h);
                    volcanoGrad.addColorStop(0, '#1a0000');
                    volcanoGrad.addColorStop(0.5, '#0f0000');
                    volcanoGrad.addColorStop(1, '#050000');
                    ctx.fillStyle = volcanoGrad;
                    ctx.beginPath();
                    ctx.moveTo(volcanoX - 250, h);
                    ctx.lineTo(volcanoX, h - volcanoH);
                    ctx.lineTo(volcanoX + 250, h);
                    ctx.fill();
                    
                    // 火山口岩浆发光
                    if (i === 1) {
                        const eruptIntensity = (Math.sin(time * 2) + 1) * 0.5;
                        ctx.fillStyle = `rgba(255, ${60 + eruptIntensity * 100}, 0, ${0.6 + eruptIntensity * 0.4})`;
                        ctx.beginPath();
                        ctx.ellipse(volcanoX, h - volcanoH + 10, 40, 15, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // 喷发粒子
                        if (Math.random() > 0.8) {
                            this.addParticle(volcanoX, h - volcanoH, '#ff4400', 1, 8);
                        }
                    }
                }
                
                // 5. 岩浆河流发光层
                const lavaGrad = ctx.createLinearGradient(0, h - 100, 0, h);
                lavaGrad.addColorStop(0, 'rgba(255, 60, 0, 0.2)');
                lavaGrad.addColorStop(0.5, 'rgba(200, 40, 0, 0.3)');
                lavaGrad.addColorStop(1, 'rgba(150, 20, 0, 0.4)');
                ctx.fillStyle = lavaGrad;
                ctx.fillRect(0, h - 120, w, 120);
                
                // 6. 漂浮的灰烬和火星
                ctx.save();
                for (let i = 0; i < 30; i++) {
                    const ashX = ((i * 137 + time * 20) % (w + 100)) - 50;
                    const ashY = ((i * 73 + time * 30 + this.camera.y * 0.1) % (h + 100)) - 50;
                    const ashSize = 1 + (i % 3);
                    const ashAlpha = 0.3 + Math.sin(time + i) * 0.2;
                    
                    ctx.fillStyle = `rgba(255, ${100 + i * 5}, 50, ${ashAlpha})`;
                    ctx.beginPath();
                    ctx.arc(ashX, ashY, ashSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
                
                ctx.restore();
            }
            
            updateUI() {
                const p = this.player;
                document.getElementById('healthFill').style.width = 
                    (p.health / p.maxHealth * 100) + '%';
                document.getElementById('hpText').textContent = 
                    Math.floor(p.health) + '/' + p.maxHealth;
                document.getElementById('staminaFill').style.width = 
                    (p.stamina / p.maxStamina * 100) + '%';
                document.getElementById('manaFill').style.width = 
                    (p.mana / p.maxMana * 100) + '%';
                document.getElementById('score').textContent = this.score;
                
                // 更新技能冷却显示
                p.skills.forEach((skill, i) => {
                    // 桌面端
                    const slot = document.getElementById('skill' + (i + 1));
                    const cd = document.getElementById('cd' + (i + 1));
                    if (slot && cd) {
                        if (skill.cooldown > 0) {
                            slot.classList.add('cooldown');
                            cd.style.height = (skill.cooldown / skill.maxCooldown * 100) + '%';
                        } else {
                            slot.classList.remove('cooldown');
                            cd.style.height = '0%';
                        }
                    }
                    // 移动端
                    const cdm = document.getElementById('cd' + (i + 1) + 'm');
                    if (cdm) {
                        cdm.style.height = skill.cooldown > 0 
                            ? (skill.cooldown / skill.maxCooldown * 100) + '%' 
                            : '0%';
                    }
                });
                
                // Boss血条
                const boss = this.enemies.find(e => e.isBoss);
                if (boss) {
                    document.getElementById('bossHpFill').style.width = 
                        (boss.health / boss.maxHealth * 100) + '%';
                }
            }
            
            gameOver() {
                this.isRunning = false;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }
            
            victory() {
                this.isRunning = false;
                document.getElementById('victoryScore').textContent = this.score;
                document.getElementById('victoryScreen').classList.remove('hidden');
            }
            
            loop() {
                if (this.isRunning) {
                    this.update();
                    this.draw();
                    requestAnimationFrame(() => this.loop());
                }
            }
            
            addParticle(x, y, color, count = 1, speed = 5) {
                for (let i = 0; i < count; i++) {
                    this.particles.push(new Particle(x, y, color, speed));
                }
            }
            
            addEffect(type, x, y, options = {}) {
                this.effects.push(new Effect(type, x, y, options));
            }
            
            addProjectile(proj) {
                this.projectiles.push(proj);
            }
            
            addFloatingText(text, x, y, type = 'normal') {
                this.floatingTexts.push(new FloatingText(text, x, y, type));
            }
            
            screenShake(amount) {
                this.camera.shake = amount;
            }
        }

        // ==================== 玩家类 ====================
        class Player {
            constructor(x, y, avatar) {
                this.x = x;
                this.y = y;
                this.width = 45;
                this.height = 80;
                this.vx = 0;
                this.vy = 0;
                this.facing = 1;
                
                // 属性
                this.maxHealth = 100;
                this.health = this.maxHealth;
                this.maxStamina = 100;
                this.stamina = this.maxStamina;
                this.maxMana = 100;
                this.mana = this.maxMana;
                
                // 状态
                this.grounded = false;
                this.attacking = false;
                this.dashing = false;
                this.invincible = false;
                
                // 武器
                this.currentWeapon = 0;
                this.weaponCooldown = 0;
                
                // 技能
                this.skills = CONFIG.SKILLS.map(s => ({
                    ...s,
                    cooldown: 0,
                    maxCooldown: s.cooldown
                }));
                
                this.avatar = avatar;
                this.animFrame = 0;
                this.animState = 'idle';
            }
            
            update(game) {
                this.animFrame++;
                
                // 耐力恢复
                if (this.stamina < this.maxStamina) {
                    this.stamina += 0.3;
                }
                
                // 魔力恢复
                if (this.mana < this.maxMana) {
                    this.mana += 0.2;
                }
                
                // 技能冷却
                this.skills.forEach(skill => {
                    if (skill.cooldown > 0) skill.cooldown--;
                });
                
                // 武器冷却
                if (this.weaponCooldown > 0) this.weaponCooldown--;
                
                // 输入处理
                if (!this.dashing && !this.attacking) {
                    if (game.keys['ArrowLeft']) {
                        this.vx = -5;
                        this.facing = -1;
                        this.animState = 'run';
                    } else if (game.keys['ArrowRight']) {
                        this.vx = 5;
                        this.facing = 1;
                        this.animState = 'run';
                    } else {
                        this.vx *= CONFIG.FRICTION;
                        this.animState = 'idle';
                    }
                }
                
                // 跳跃
                if (game.keys['ArrowUp'] && this.grounded && !this.dashing) {
                    if (this.stamina >= 15) {
                        this.vy = -14;
                        this.grounded = false;
                        this.stamina -= 15;
                        game.addParticle(this.x + this.width/2, this.y + this.height, '#ff4400', 8, 7);
                        game.addEffect('jump', this.x + this.width/2, this.y + this.height);
                    }
                }
                
                // 攻击
                if (game.keys['z'] && this.weaponCooldown <= 0 && !this.attacking) {
                    this.attack(game);
                }
                
                // 冲刺
                if (game.keys['x'] && !this.dashing && this.stamina >= 20) {
                    this.dash(game);
                }
                
                // 重力
                this.vy += CONFIG.GRAVITY;
                
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                
                // 平台碰撞
                this.grounded = false;
                for (const platform of game.platforms) {
                    if (Utils.rectIntersect(this, platform)) {
                        if (this.vy > 0 && this.y + this.height - this.vy <= platform.y) {
                            this.y = platform.y - this.height;
                            this.vy = 0;
                            this.grounded = true;
                        }
                    }
                }
                
                // 边界
                if (this.y > game.canvas.height + 200) {
                    this.health = 0;
                }
                
                // 敌人碰撞
                if (!this.invincible && !this.dashing) {
                    for (const enemy of game.enemies) {
                        if (Utils.rectIntersect(this, enemy)) {
                            this.takeDamage(15, game);
                        }
                    }
                }
            }
            
            attack(game) {
                const weapon = CONFIG.WEAPONS[this.currentWeapon];
                this.attacking = true;
                this.weaponCooldown = weapon.speed * 60;
                this.animState = 'attack';
                
                // 远程武器
                if (weapon.type === 'ranged') {
                    const proj = new Projectile(
                        this.x + this.width/2,
                        this.y + this.height/3,
                        this.facing * 12,
                        0,
                        weapon.damage,
                        weapon.color,
                        'player'
                    );
                    game.addProjectile(proj);
                    game.addParticle(this.x + this.width/2, this.y + this.height/3, '#ffaa00', 5, 4);
                } else {
                    // 近战
                    const attackX = this.x + this.width/2 + this.facing * weapon.range/2;
                    const attackY = this.y + this.height/2;
                    
                    game.addEffect('slash', attackX, attackY, { 
                        facing: this.facing, 
                        color: weapon.color,
                        size: weapon.range 
                    });
                    
                    // 检测命中
                    const attackBox = {
                        x: this.facing === 1 ? this.x + this.width : this.x - weapon.range,
                        y: this.y,
                        width: weapon.range,
                        height: this.height
                    };
                    
                    game.enemies.forEach(enemy => {
                        if (Utils.rectIntersect(attackBox, enemy)) {
                            const crit = Math.random() > 0.8;
                            const damage = weapon.damage * (crit ? 2 : 1);
                            enemy.takeDamage(damage, game, crit);
                            
                            // 击退
                            enemy.vx = this.facing * 8;
                            enemy.vy = -5;
                            
                            game.screenShake(3);
                        }
                    });
                }
                
                setTimeout(() => {
                    this.attacking = false;
                }, weapon.speed * 500);
            }
            
            dash(game) {
                this.dashing = true;
                this.stamina -= 20;
                this.invincible = true;
                
                game.addEffect('dash', this.x + this.width/2, this.y + this.height/2, { facing: this.facing });
                
                let dashFrame = 0;
                const dashInterval = setInterval(() => {
                    this.x += this.facing * 15;
                    dashFrame++;
                    game.addParticle(this.x + this.width/2, this.y + this.height/2, '#ffff00', 2, 3);
                    
                    if (dashFrame >= 8) {
                        clearInterval(dashInterval);
                        this.dashing = false;
                        this.invincible = false;
                        this.vx = this.facing * 3;
                    }
                }, 16);
            }
            
            useSkill(index, game) {
                const skill = this.skills[index];
                if (skill.cooldown > 0 || this.mana < skill.mana) return;
                
                skill.cooldown = skill.maxCooldown;
                this.mana -= skill.mana;
                
                switch(index) {
                    case 0: // 火球术
                        this.castFireball(game, skill);
                        break;
                    case 1: // 闪电冲刺
                        this.castLightningDash(game, skill);
                        break;
                    case 2: // 旋风斩
                        this.castWhirlwind(game, skill);
                        break;
                    case 3: // 死亡之握
                        this.castDeathGrip(game, skill);
                        break;
                }
            }
            
            castFireball(game, skill) {
                const proj = new Projectile(
                    this.x + this.width/2,
                    this.y + this.height/3,
                    this.facing * 10,
                    0,
                    skill.damage,
                    skill.color,
                    'player',
                    'fireball'
                );
                game.addProjectile(proj);
                game.addEffect('cast', this.x + this.width/2, this.y, { color: skill.color });
            }
            
            castLightningDash(game, skill) {
                this.invincible = true;
                const startX = this.x;
                const dashDist = 300;
                const endX = this.x + this.facing * dashDist;
                
                // 对路径上的敌人造成伤害
                game.enemies.forEach(enemy => {
                    if (Math.abs(enemy.y - this.y) < 100 &&
                        ((this.facing === 1 && enemy.x > startX && enemy.x < endX) ||
                         (this.facing === -1 && enemy.x < startX && enemy.x > endX))) {
                        enemy.takeDamage(skill.damage, game);
                        enemy.stunned = 60;
                    }
                });
                
                game.addEffect('lightning', this.x + this.width/2, this.y + this.height/2, { 
                    facing: this.facing, 
                    distance: dashDist 
                });
                
                this.x = endX;
                setTimeout(() => this.invincible = false, 200);
            }
            
            castWhirlwind(game, skill) {
                let spins = 0;
                const maxSpins = 10;
                
                this.attacking = true;
                
                const spinInterval = setInterval(() => {
                    game.addEffect('whirlwind', this.x + this.width/2, this.y + this.height/2);
                    
                    game.enemies.forEach(enemy => {
                        const dist = Utils.distance(
                            {x: this.x + this.width/2, y: this.y + this.height/2},
                            {x: enemy.x + enemy.width/2, y: enemy.y + enemy.height/2}
                        );
                        if (dist < 120) {
                            enemy.takeDamage(skill.damage / maxSpins, game);
                        }
                    });
                    
                    spins++;
                    if (spins >= maxSpins) {
                        clearInterval(spinInterval);
                        this.attacking = false;
                    }
                }, 50);
            }
            
            castDeathGrip(game, skill) {
                game.addEffect('deathgrip', this.x + this.facing * 200, this.y);
                
                setTimeout(() => {
                    // 大范围伤害
                    game.enemies.forEach(enemy => {
                        const dist = Utils.distance(
                            {x: this.x + this.width/2, y: this.y + this.height/2},
                            {x: enemy.x + enemy.width/2, y: enemy.y + enemy.height/2}
                        );
                        if (dist < 300) {
                            enemy.takeDamage(skill.damage, game);
                            enemy.vy = -10;
                        }
                    });
                    
                    game.screenShake(15);
                    game.addParticle(this.x + this.facing * 200, this.y, '#6600cc', 30, 10);
                }, 500);
            }
            
            switchWeapon() {
                this.currentWeapon = (this.currentWeapon + 1) % CONFIG.WEAPONS.length;
                document.getElementById('weaponName').textContent = 
                    CONFIG.WEAPONS[this.currentWeapon].name;
            }
            
            takeDamage(amount, game) {
                this.health -= amount;
                game.screenShake(5);
                game.addParticle(this.x + this.width/2, this.y + this.height/2, '#ff0000', 10, 6);
                
                this.invincible = true;
                setTimeout(() => this.invincible = false, 1000);
            }
            
            draw(ctx) {
                ctx.save();
                
                if (this.invincible && Math.floor(Date.now() / 50) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // 绘制人型角色
                this.drawHumanoid(ctx);
                
                ctx.restore();
            }
            
            drawHumanoid(ctx) {
                const centerX = this.x + this.width/2;
                const centerY = this.y + this.height/2;
                const time = Date.now() * 0.001;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                if (this.facing === -1) {
                    ctx.scale(-1, 1);
                }
                
                // 动画参数
                const runCycle = this.animFrame * 0.15;
                const isRunning = this.animState === 'run';
                const isJumping = !this.grounded;
                const isAttacking = this.attacking;
                
                // 身体摆动 - 更自然的体态变化
                const bodyBob = isRunning ? Math.sin(runCycle) * 4 : 
                               isJumping ? -Math.sin(time * 10) * 3 : 
                               Math.sin(time * 2) * 1;
                
                const bodyTilt = isRunning ? Math.sin(runCycle) * 0.05 :
                                 isAttacking ? 0.15 : 0;
                
                // 披风动态摆动
                const capeSway = Math.sin(runCycle * 0.7 + time * 3) * (isRunning ? 20 : 8);
                const capeLift = isJumping ? -15 : Math.cos(runCycle) * 5;
                
                // ========== 绘制披风 (在身体后面) ==========
                ctx.save();
                ctx.translate(0, -15 + bodyBob);
                ctx.rotate(capeSway * Math.PI / 180);
                
                // 披风渐变
                const capeGrad = ctx.createLinearGradient(0, -20, 0, 45);
                capeGrad.addColorStop(0, '#2a0000');
                capeGrad.addColorStop(0.3, '#440000');
                capeGrad.addColorStop(0.7, '#660000');
                capeGrad.addColorStop(1, '#220000');
                ctx.fillStyle = capeGrad;
                
                // 披风形状 - 更流畅的曲线
                ctx.beginPath();
                ctx.moveTo(-8, -20);
                ctx.quadraticCurveTo(-25 + capeSway * 0.3, 10 + capeLift, -20 + capeSway * 0.5, 45 + capeLift);
                ctx.quadraticCurveTo(0, 50 + capeLift * 0.5, 20 - capeSway * 0.5, 45 + capeLift);
                ctx.quadraticCurveTo(15 + capeSway * 0.3, 10 + capeLift, 8, -20);
                ctx.closePath();
                ctx.fill();
                
                // 披风装饰边缘
                ctx.strokeStyle = '#ff4400';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-8, -20);
                ctx.quadraticCurveTo(-20 + capeSway * 0.3, 10, -15 + capeSway * 0.5, 35);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(8, -20);
                ctx.quadraticCurveTo(15 + capeSway * 0.3, 10, 10 - capeSway * 0.5, 35);
                ctx.stroke();
                
                ctx.restore();
                
                // ========== 腿部 (更真实的比例) ==========
                const leftLegAngle = isRunning ? Math.sin(runCycle) * 0.5 : 0;
                const rightLegAngle = isRunning ? Math.sin(runCycle + Math.PI) * 0.5 : 0;
                
                // 护腿 - 左
                ctx.save();
                ctx.translate(-6, 18 + bodyBob);
                ctx.rotate(leftLegAngle);
                const legGrad = ctx.createLinearGradient(-4, 0, 4, 0);
                legGrad.addColorStop(0, '#1a0500');
                legGrad.addColorStop(0.5, '#330a00');
                legGrad.addColorStop(1, '#1a0500');
                ctx.fillStyle = legGrad;
                ctx.fillRect(-5, 0, 10, 22);
                // 护腿装甲线条
                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-3, 3);
                ctx.lineTo(-3, 18);
                ctx.moveTo(3, 3);
                ctx.lineTo(3, 18);
                ctx.stroke();
                // 护膝
                ctx.fillStyle = '#441100';
                ctx.beginPath();
                ctx.arc(0, 8, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ff8800';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
                
                // 护腿 - 右
                ctx.save();
                ctx.translate(6, 18 + bodyBob);
                ctx.rotate(rightLegAngle);
                ctx.fillStyle = legGrad;
                ctx.fillRect(-5, 0, 10, 22);
                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(-3, 3);
                ctx.lineTo(-3, 18);
                ctx.moveTo(3, 3);
                ctx.lineTo(3, 18);
                ctx.stroke();
                ctx.fillStyle = '#441100';
                ctx.beginPath();
                ctx.arc(0, 8, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ff8800';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
                
                // ========== 身体 ==========
                ctx.save();
                ctx.translate(0, bodyBob);
                ctx.rotate(bodyTilt);
                
                // 腰部
                ctx.fillStyle = '#1a0a00';
                ctx.fillRect(-10, 10, 20, 10);
                
                // 上身护甲
                const armorGrad = ctx.createLinearGradient(-12, -20, 12, 20);
                armorGrad.addColorStop(0, '#2a0000');
                armorGrad.addColorStop(0.3, '#550000');
                armorGrad.addColorStop(0.5, '#770000');
                armorGrad.addColorStop(0.7, '#550000');
                armorGrad.addColorStop(1, '#2a0000');
                ctx.fillStyle = armorGrad;
                ctx.fillRect(-13, -22, 26, 35);
                
                // 胸甲细节 - 多层结构
                ctx.strokeStyle = '#ff4400';
                ctx.lineWidth = 2;
                // 中央脊柱线
                ctx.beginPath();
                ctx.moveTo(0, -18);
                ctx.lineTo(0, 10);
                ctx.stroke();
                // 胸甲板
                ctx.fillStyle = 'rgba(100, 20, 0, 0.6)';
                ctx.fillRect(-10, -15, 20, 20);
                ctx.strokeRect(-10, -15, 20, 20);
                // 十字徽记
                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(0, -12);
                ctx.lineTo(0, 8);
                ctx.moveTo(-6, -2);
                ctx.lineTo(6, -2);
                ctx.stroke();
                
                // 肩甲 - 左
                const shoulderLift = isRunning ? Math.sin(runCycle) * 3 : 0;
                ctx.fillStyle = '#440000';
                ctx.beginPath();
                ctx.ellipse(-16, -18 + shoulderLift, 8, 10, -0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 2;
                ctx.stroke();
                // 肩甲装饰
                ctx.fillStyle = '#ff8800';
                ctx.beginPath();
                ctx.arc(-16, -18 + shoulderLift, 3, 0, Math.PI * 2);
                ctx.fill();
                
                // 肩甲 - 右
                ctx.fillStyle = '#440000';
                ctx.beginPath();
                ctx.ellipse(16, -18 - shoulderLift, 8, 10, 0.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = '#ff8800';
                ctx.beginPath();
                ctx.arc(16, -18 - shoulderLift, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
                
                // ========== 头部 ==========
                ctx.save();
                ctx.translate(0, -32 + bodyBob);
                ctx.rotate(bodyTilt * 0.5);
                
                // 脖子
                ctx.fillStyle = '#cc8866';
                ctx.fillRect(-4, 8, 8, 8);
                // 脖子阴影
                ctx.fillStyle = '#aa6644';
                ctx.fillRect(-2, 10, 4, 4);
                
                // 头像圆形裁剪区域
                ctx.beginPath();
                ctx.arc(0, -5, 18, 0, Math.PI * 2);
                ctx.clip();
                
                // 头像背景圆
                ctx.fillStyle = '#331100';
                ctx.beginPath();
                ctx.arc(0, -5, 18, 0, Math.PI * 2);
                ctx.fill();
                
                // 绘制头像
                ctx.drawImage(this.avatar, -18, -23, 36, 36);
                
                // 头像边框
                ctx.strokeStyle = '#ff4400';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, -5, 18, 0, Math.PI * 2);
                ctx.stroke();
                
                ctx.restore();
                
                // ========== 武器 (在手臂前或后) ==========
                if (this.attacking) {
                    this.drawWeaponAttack(ctx, bodyBob);
                } else {
                    this.drawWeaponIdle(ctx, bodyBob);
                }
                
                // ========== 手臂 ==========
                const leftArmSwing = isRunning ? Math.sin(runCycle + Math.PI) * 18 : 
                                     isAttacking ? -20 : 5;
                const rightArmSwing = isRunning ? Math.sin(runCycle) * 18 : 
                                      isAttacking ? 35 : -5;
                
                // 左手臂
                ctx.save();
                ctx.translate(-16, -12 + bodyBob);
                ctx.rotate(leftArmSwing * Math.PI / 180);
                ctx.fillStyle = '#cc8866';
                ctx.fillRect(-4, 0, 8, 22);
                // 护腕
                ctx.fillStyle = '#330000';
                ctx.fillRect(-5, 5, 10, 8);
                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 1;
                ctx.strokeRect(-5, 5, 10, 8);
                // 手
                ctx.fillStyle = '#cc8866';
                ctx.beginPath();
                ctx.arc(0, 24, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                // 右手臂
                ctx.save();
                ctx.translate(16, -12 + bodyBob);
                ctx.rotate(rightArmSwing * Math.PI / 180);
                ctx.fillStyle = '#cc8866';
                ctx.fillRect(-4, 0, 8, 22);
                ctx.fillStyle = '#330000';
                ctx.fillRect(-5, 5, 10, 8);
                ctx.strokeStyle = '#ff6600';
                ctx.lineWidth = 1;
                ctx.strokeRect(-5, 5, 10, 8);
                ctx.fillStyle = '#cc8866';
                ctx.beginPath();
                ctx.arc(0, 24, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                // ========== 发光效果 ==========
                if (this.invincible || this.dashing) {
                    ctx.save();
                    const glowIntensity = Math.sin(time * 10) * 0.5 + 0.5;
                    ctx.shadowColor = this.dashing ? '#ffff00' : '#00aaff';
                    ctx.shadowBlur = 20 + glowIntensity * 15;
                    ctx.strokeStyle = `rgba(${this.dashing ? '255,255,0' : '0,170,255'}, ${0.3 + glowIntensity * 0.4})`;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 20, 35, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                
                // 技能状态发光
                if (this.skills.some(s => s.cooldown < 10 && s.cooldown > 0)) {
                    ctx.save();
                    ctx.shadowColor = '#ff4400';
                    ctx.shadowBlur = 15;
                    ctx.strokeStyle = 'rgba(255, 68, 0, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, -15, 25 + Math.sin(time * 5) * 3, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }
                
                ctx.restore();
            }
            
            drawWeaponIdle(ctx, bodyBob) {
                const weapon = CONFIG.WEAPONS[this.currentWeapon];
                const time = Date.now() * 0.001;
                ctx.save();
                ctx.translate(20, -5 + bodyBob);
                
                if (weapon.type === 'dual') {
                    // ========== 烈焰双刁 - 精细设计 ==========
                    ctx.save();
                    ctx.rotate(-0.2);
                    
                    // 刀柄
                    ctx.fillStyle = '#2a1a0a';
                    ctx.fillRect(-4, -8, 8, 15);
                    ctx.fillStyle = '#554433';
                    ctx.fillRect(-3, -7, 6, 13);
                    // 护手
                    ctx.fillStyle = '#660000';
                    ctx.beginPath();
                    ctx.moveTo(-6, 0);
                    ctx.lineTo(6, 0);
                    ctx.lineTo(4, 8);
                    ctx.lineTo(-4, 8);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#ff4400';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    // 刀刃 - 多层渐变
                    const bladeGrad = ctx.createLinearGradient(-3, 0, 3, 0);
                    bladeGrad.addColorStop(0, '#330a00');
                    bladeGrad.addColorStop(0.3, '#aa2200');
                    bladeGrad.addColorStop(0.5, '#ff6600');
                    bladeGrad.addColorStop(0.7, '#aa2200');
                    bladeGrad.addColorStop(1, '#330a00');
                    ctx.fillStyle = bladeGrad;
                    
                    // 刀刋轮廓
                    ctx.beginPath();
                    ctx.moveTo(-3, 0);
                    ctx.lineTo(-3, -35);
                    ctx.quadraticCurveTo(-1, -42, 0, -45);
                    ctx.quadraticCurveTo(1, -42, 3, -35);
                    ctx.lineTo(3, 0);
                    ctx.closePath();
                    ctx.fill();
                    
                    // 刀刋光泽线
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, -5);
                    ctx.lineTo(0, -38);
                    ctx.stroke();
                    
                    // 刀纹
                    ctx.strokeStyle = '#ff4400';
                    ctx.lineWidth = 0.5;
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(-1, -10 - i * 8);
                        ctx.lineTo(1, -12 - i * 8);
                        ctx.stroke();
                    }
                    
                    // 火焰效果
                    const flameIntensity = Math.sin(time * 8) * 0.3 + 0.7;
                    ctx.shadowColor = '#ff4400';
                    ctx.shadowBlur = 10 + flameIntensity * 10;
                    ctx.strokeStyle = `rgba(255, 100, 0, ${0.5 + flameIntensity * 0.3})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-2, -35);
                    ctx.quadraticCurveTo(0, -48, 2, -35);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    
                    // 火焰粒子
                    if (Math.random() > 0.7) {
                        ctx.fillStyle = `rgba(255, ${Math.floor(100 + Math.random() * 100)}, 0, 0.8)`;
                        const px = (Math.random() - 0.5) * 6;
                        const py = -30 - Math.random() * 15;
                        ctx.beginPath();
                        ctx.arc(px, py, 1 + Math.random() * 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    ctx.restore();
                    
                    // 第二把刀 (略小一点)
                    ctx.save();
                    ctx.translate(-5, 5);
                    ctx.rotate(0.1);
                    ctx.scale(0.85, 0.85);
                    
                    ctx.fillStyle = '#2a1a0a';
                    ctx.fillRect(-3, -6, 6, 12);
                    const bladeGrad2 = ctx.createLinearGradient(-2, 0, 2, 0);
                    bladeGrad2.addColorStop(0, '#330a00');
                    bladeGrad2.addColorStop(0.5, '#ff4400');
                    bladeGrad2.addColorStop(1, '#330a00');
                    ctx.fillStyle = bladeGrad2;
                    ctx.beginPath();
                    ctx.moveTo(-2, 0);
                    ctx.lineTo(-2, -30);
                    ctx.quadraticCurveTo(0, -35, 2, -30);
                    ctx.lineTo(2, 0);
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.restore();
                    
                } else if (weapon.type === 'heavy') {
                    // ========== 地狱大剑 - 巨型重剑 ==========
                    ctx.save();
                    ctx.rotate(0.4);
                    
                    // 巨大剑柄
                    ctx.fillStyle = '#1a0a05';
                    ctx.fillRect(-8, -10, 16, 25);
                    ctx.fillStyle = '#3d2817';
                    ctx.fillRect(-6, -8, 12, 21);
                    // 剑柄装饰
                    ctx.strokeStyle = '#660000';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-6, -5);
                    ctx.lineTo(-6, 10);
                    ctx.moveTo(6, -5);
                    ctx.lineTo(6, 10);
                    ctx.stroke();
                    
                    // 巨大护手
                    ctx.fillStyle = '#220000';
                    ctx.beginPath();
                    ctx.moveTo(-15, 5);
                    ctx.lineTo(15, 5);
                    ctx.lineTo(12, 18);
                    ctx.lineTo(-12, 18);
                    ctx.closePath();
                    ctx.fill();
                    // 护手纹理
                    ctx.strokeStyle = '#ff4400';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-10, 8);
                    ctx.lineTo(-8, 15);
                    ctx.moveTo(10, 8);
                    ctx.lineTo(8, 15);
                    ctx.stroke();
                    
                    // 巨大剑身
                    const bladeGrad = ctx.createLinearGradient(-8, 0, 8, 0);
                    bladeGrad.addColorStop(0, '#1a0022');
                    bladeGrad.addColorStop(0.2, '#440066');
                    bladeGrad.addColorStop(0.5, '#9600ff');
                    bladeGrad.addColorStop(0.8, '#440066');
                    bladeGrad.addColorStop(1, '#1a0022');
                    ctx.fillStyle = bladeGrad;
                    
                    // 剑身轮廓 - 锋利形状
                    ctx.beginPath();
                    ctx.moveTo(-10, 15);
                    ctx.lineTo(-8, -70);
                    ctx.quadraticCurveTo(-4, -85, 0, -90);
                    ctx.quadraticCurveTo(4, -85, 8, -70);
                    ctx.lineTo(10, 15);
                    ctx.closePath();
                    ctx.fill();
                    
                    // 剑身纹理
                    ctx.strokeStyle = '#330044';
                    ctx.lineWidth = 1;
                    for (let i = 0; i < 5; i++) {
                        ctx.beginPath();
                        ctx.moveTo(-6, 10 - i * 15);
                        ctx.lineTo(6, 15 - i * 15);
                        ctx.stroke();
                    }
                    
                    // 符文发光效果
                    const runeGlow = Math.sin(time * 4) * 0.3 + 0.7;
                    ctx.shadowColor = '#9600ff';
                    ctx.shadowBlur = 15 + runeGlow * 15;
                    ctx.fillStyle = `rgba(150, 0, 255, ${0.4 + runeGlow * 0.4})`;
                    
                    // 符文图案
                    for (let i = 0; i < 3; i++) {
                        const ry = -20 - i * 20;
                        ctx.beginPath();
                        ctx.arc(0, ry, 4 + i, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.moveTo(-3, ry - 5);
                        ctx.lineTo(0, ry + 5);
                        ctx.lineTo(3, ry - 5);
                        ctx.stroke();
                    }
                    
                    // 剑边光芒
